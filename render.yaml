services:
  - type: web
    name: scenecraft-ai-composer
    runtime: node
    plan: starter
    buildCommand: ""
    startCommand: npm start
    healthCheckPath: /healthz
    envVars:
      - key: NODE_ENV
        value: production
      - key: OPENAI_IMAGE_MODEL
        value: gpt-image-2
      - key: OPENAI_API_KEY
        sync: false
