services:
  - type: web
    name: scenecraft-ai-composer
    runtime: node
    plan: starter
    buildCommand: ""
    startCommand: npm start
    healthCheckPath: /healthz
    envVars:
      - key: NODE_ENV
        value: production
      - key: DASHSCOPE_IMAGE_MODEL
        value: wan2.5-i2i-preview
      - key: DASHSCOPE_API_BASE
        value: https://dashscope.aliyuncs.com/api/v1
      - key: DASHSCOPE_IMAGE_SIZE
        value: 1080*1350
      - key: DASHSCOPE_API_KEY
        sync: false
